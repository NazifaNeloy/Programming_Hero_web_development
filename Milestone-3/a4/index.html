<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    
    <!-- Tailwind CSS & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        darkBg: '#0F1115',
                        cardBg: '#1A1D23',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0F1115;
            color: #E2E8F0;
        }
        
        .card-custom {
            position: relative;
            transition: all 0.3s ease;
            overflow: hidden; /* Ensures the accent line respects rounded corners */
            border: 1px solid #1f2937; /* Default gray border for all sides */
        }
        
        .card-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* --- ACCENT LINE IMPLEMENTATION (::before) --- */
        /* This method guarantees visibility */

        .status-accent-interview::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px; /* 5px solid width */
            background-color: #10B981; /* Green */
            z-index: 10;
        }

        .status-accent-rejected::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px; /* 5px solid width */
            background-color: #EF4444; /* Red */
            z-index: 10;
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-7xl mx-auto">
        
        <!-- Header -->
        <h1 class="text-3xl font-bold text-blue-500 mb-8 tracking-wide">Job Application Tracker</h1>

        <!-- Dashboard Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <!-- Total -->
            <div class="bg-[#1A1D23] rounded-xl p-6 border border-gray-800 shadow-lg">
                <div class="text-xs font-bold text-gray-400 uppercase tracking-wider">Total</div>
                <div class="text-4xl font-bold mt-2 text-white" id="count-total">8</div>
            </div>
            <!-- Interview -->
            <div class="bg-[#1A1D23] rounded-xl p-6 border border-gray-800 shadow-lg">
                <div class="text-xs font-bold text-gray-400 uppercase tracking-wider">Interview</div>
                <div class="text-4xl font-bold mt-2 text-green-500" id="count-interview">0</div>
            </div>
            <!-- Rejected -->
            <div class="bg-[#1A1D23] rounded-xl p-6 border border-gray-800 shadow-lg">
                <div class="text-xs font-bold text-gray-400 uppercase tracking-wider">Rejected</div>
                <div class="text-4xl font-bold mt-2 text-red-500" id="count-rejected">0</div>
            </div>
        </div>

        <!-- Available Jobs Header -->
        <div class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <h2 class="text-2xl font-bold text-white">Available Jobs</h2>
            <span class="text-gray-400 font-medium text-sm"><span id="section-count" class="text-blue-400 font-bold">8</span> jobs found</span>
        </div>

        <!-- Tabs -->
        <div class="flex gap-1 mb-8 bg-[#16191E] p-1.5 rounded-lg w-fit border border-gray-800">
            <button onclick="switchTab('all')" id="tab-all" class="px-8 py-2 rounded-md text-sm font-medium transition-colors bg-blue-600 text-white shadow-lg">All</button>
            <button onclick="switchTab('interview')" id="tab-interview" class="px-8 py-2 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-white/5 transition-colors">Interview</button>
            <button onclick="switchTab('rejected')" id="tab-rejected" class="px-8 py-2 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-white/5 transition-colors">Rejected</button>
        </div>

        <!-- Jobs Container -->
        <div id="jobs-container" class="grid gap-4">
            <!-- Cards will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-32 bg-[#1A1D23] rounded-xl border border-gray-800">
            <div class="mb-6">
                <i class="fa-solid fa-file-lines text-7xl text-[#3B82F6]"></i>
            </div>
            <h3 class="text-2xl font-bold text-white mb-2">No jobs available</h3>
            <p class="text-gray-400 text-sm">Check back soon for new job opportunities</p>
        </div>

    </div>

    <!-- Logic -->
    <script>
        // 1. Job Data
        let jobs = [
            { id: 1, company: "Mobile First Corp", position: "React Native Developer", location: "Remote", type: "Full-time", salary: "$130,000 - $175,000", description: "Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.", status: "default" },
            { id: 2, company: "WebFlow Agency", position: "Web Designer & Developer", location: "Los Angeles, CA", type: "Part-time", salary: "$80,000 - $120,000", description: "Create stunning web experiences for high-profile clients. Must have portfolio and experience with modern web design trends.", status: "default" },
            { id: 3, company: "DataViz Solutions", position: "Data Visualization Specialist", location: "Boston, MA", type: "Full-time", salary: "$125,000 - $165,000", description: "Transform complex data into compelling visualizations. Required skills: D3.js, React, and strong analytical thinking.", status: "default" },
            { id: 4, company: "CloudFirst Inc", position: "Backend Developer", location: "Seattle, WA", type: "Full-time", salary: "$140,000 - $190,000", description: "Design and maintain scalable backend systems using Python and AWS. Work with modern DevOps practices and cloud infrastructure.", status: "default" },
            { id: 5, company: "Innovation Labs", position: "UI/UX Engineer", location: "Austin, TX", type: "Full-time", salary: "$110,000 - $150,000", description: "Create beautiful and functional user interfaces for our suite of products. Strong design skills and frontend development expertise required.", status: "default" },
            { id: 6, company: "MegaCorp Solutions", position: "JavaScript Developer", location: "New York, NY", type: "Full-time", salary: "$130,000 - $170,000", description: "Build enterprise applications with JavaScript and modern frameworks. We offer competitive compensation, health insurance, and professional development opportunities.", status: "default" },
            { id: 7, company: "StartupXYZ", position: "Full Stack Engineer", location: "Remote", type: "Full-time", salary: "$120,000 - $160,000", description: "Join our fast-growing startup and work on our core platform. Experience with Node.js and React required. Great benefits and equity package included.", status: "default" },
            { id: 8, company: "TechCorp Industries", position: "Senior Frontend Developer", location: "San Francisco, CA", type: "Full-time", salary: "$130,000 - $175,000", description: "We are looking for an experienced Frontend Developer to build scalable web applications using React and TypeScript. You will work with a talented team on cutting-edge projects.", status: "default" }
        ];

        let currentTab = 'all';

        // 2. Render Function
        function renderJobs() {
            const container = document.getElementById('jobs-container');
            const emptyState = document.getElementById('empty-state');
            const sectionCount = document.getElementById('section-count');
            
            container.innerHTML = '';

            const filteredJobs = jobs.filter(job => {
                if (currentTab === 'all') return true;
                return job.status === currentTab;
            });

            sectionCount.innerText = filteredJobs.length;

            if (filteredJobs.length === 0) {
                emptyState.classList.remove('hidden');
                container.classList.add('hidden');
            } else {
                emptyState.classList.add('hidden');
                container.classList.remove('hidden');
                
                filteredJobs.forEach(job => {
                    // Accent Logic using ::before pseudo-classes
                    let accentClass = ""; 
                    if (job.status === 'interview') accentClass = "status-accent-interview";
                    if (job.status === 'rejected') accentClass = "status-accent-rejected";

                    // Badge Logic
                    let badgeHTML = '';
                    if (job.status === 'interview') {
                        badgeHTML = `<div class="mb-4"><span class="px-3 py-1 rounded text-xs font-bold uppercase tracking-wider bg-green-500/10 text-green-500 border border-green-500/20">Interview</span></div>`;
                    } else if (job.status === 'rejected') {
                        badgeHTML = `<div class="mb-4"><span class="px-3 py-1 rounded text-xs font-bold uppercase tracking-wider bg-red-500/10 text-red-500 border border-red-500/20">Rejected</span></div>`;
                    } else {
                        badgeHTML = `<div class="mb-4"><span class="px-3 py-1 rounded text-xs font-bold uppercase tracking-wider bg-gray-700 text-gray-300 border border-gray-600">Not Applied</span></div>`;
                    }

                    // Button Logic
                    const btnBase = "px-4 py-2 rounded text-sm font-bold border transition-all duration-200 uppercase tracking-wider";
                    
                    const isInterview = job.status === 'interview';
                    const isRejected = job.status === 'rejected';

                    const btnInterviewClass = isInterview
                        ? `${btnBase} bg-green-600 border-green-600 text-white shadow-lg shadow-green-900/50`
                        : `${btnBase} border-green-600 text-green-500 hover:bg-green-600 hover:text-white bg-transparent`;

                    const btnRejectedClass = isRejected
                        ? `${btnBase} bg-red-500 border-red-500 text-white shadow-lg shadow-red-900/50`
                        : `${btnBase} border-red-500 text-red-500 hover:bg-red-500 hover:text-white bg-transparent`;

                    const card = document.createElement('div');
                    // Applying the accent class here
                    card.className = `card-custom bg-[#1A1D23] p-6 rounded-xl relative ${accentClass}`;
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-xl font-bold text-white mb-1">${job.company}</h3>
                                <p class="text-gray-400 text-sm font-medium mb-3">${job.position}</p>
                            </div>
                            <button onclick="deleteJob(${job.id})" class="text-gray-500 hover:text-red-500 transition-colors">
                                <i class="fa-regular fa-trash-can text-lg"></i>
                            </button>
                        </div>

                        <div class="flex flex-wrap gap-x-6 gap-y-2 text-xs text-gray-400 mb-5 font-mono">
                            <span>${job.location}</span>
                            <span>•</span>
                            <span>${job.type}</span>
                            <span>•</span>
                            <span class="text-gray-300">${job.salary}</span>
                        </div>

                        ${badgeHTML}

                        <p class="text-gray-500 text-sm mb-6 leading-relaxed border-t border-gray-800/50 pt-4">
                            ${job.description}
                        </p>

                        <div class="flex gap-3">
                            <button onclick="updateStatus(${job.id}, 'interview')" class="${btnInterviewClass}">Interview</button>
                            <button onclick="updateStatus(${job.id}, 'rejected')" class="${btnRejectedClass}">Rejected</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
            updateDashboard();
        }

        function switchTab(tabName) {
            currentTab = tabName;
            ['all', 'interview', 'rejected'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tabName) {
                    btn.className = "px-8 py-2 rounded-md text-sm font-medium bg-blue-600 text-white shadow-lg transition-colors";
                } else {
                    btn.className = "px-8 py-2 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-white/5 transition-colors";
                }
            });
            renderJobs();
        }

        function updateStatus(id, newStatus) {
            const jobIndex = jobs.findIndex(j => j.id === id);
            if (jobIndex === -1) return;
            jobs[jobIndex].status = newStatus;
            renderJobs();
        }

        function deleteJob(id) {
            jobs = jobs.filter(job => job.id !== id);
            renderJobs();
        }

        function updateDashboard() {
            document.getElementById('count-total').innerText = jobs.length;
            document.getElementById('count-interview').innerText = jobs.filter(j => j.status === 'interview').length;
            document.getElementById('count-rejected').innerText = jobs.filter(j => j.status === 'rejected').length;
        }

        renderJobs();

    </script>
</body>
</html>
